services:
  network-sentinel:
    container_name: network-sentinel
    build: .
    # Host networking is mandatory for accurate local gateway & Tailscale diagnostics
    network_mode: "host"
    restart: unless-stopped
    volumes:
      # Persist SQLite historical logs onto your server SSD
      - ./data:/app/data
    environment:
      - SENTINEL_PORT=5000
      - SENTINEL_GATEWAY_IP=192.168.1.1
      - SENTINEL_EXTERNAL_DNS=1.1.1.1
      - SENTINEL_INTERVAL_SEC=60
      # Live Pi-hole Connection Secrets
      - PIHOLE_URL=http://192.168.1.188
      - PIHOLE_API_TOKEN=PUT_YOUR_REAL_PASSWORD_HERE
      - PIHOLE_VERSION=6
      # Scoring Math Calibration
      - WEIGHT_WIFI=0.45
      - WEIGHT_PIHOLE=0.35
      - WEIGHT_TAILSCALE=0.20